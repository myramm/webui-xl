<h1 class="text-xl font-bold mb-4">Akun Tersimpan</h1>
<div class="space-y-2 mb-6">
  {{^has_accounts}}
  <div class="card text-slate-400 text-sm">Belum ada akun. <a href="/login" class="text-indigo-300">Login</a> untuk menambah.</div>
  {{/has_accounts}}
  {{#accounts}}
  <div class="card flex items-center justify-between gap-3">
    <div>
      <div class="font-mono text-lg">{{number}}</div>
      <div class="text-xs text-slate-400">{{subscription_type}} · sub_id: {{subscriber_id}}</div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      {{#is_active}}
      <span class="text-emerald-400 text-sm">✓ Aktif</span>
      {{/is_active}}
      {{^is_active}}
      <form action="/accounts/activate" method="post">
        <input type="hidden" name="number" value="{{number}}">
        <button class="btn btn-secondary" type="submit">Set Aktif</button>
      </form>
      {{/is_active}}
      <form action="/accounts/remove" method="post"
            data-confirm="Akun <span class='font-mono text-red-300'>{{number}}</span> bakal di-remove dari local storage."
            data-confirm-title="Hapus akun?"
            data-confirm-variant="danger"
            data-confirm-ok="Hapus">
        <input type="hidden" name="number" value="{{number}}">
        <button class="btn btn-danger" type="submit">Hapus</button>
      </form>
    </div>
  </div>
  {{/accounts}}
</div>
<a href="/login" class="btn btn-primary">+ Tambah Akun</a>
