<a href="/notifications" class="text-sm text-indigo-400 hover:text-indigo-300 flex items-center mb-4">← Kembali ke Daftar</a>

<div class="card max-w-2xl">
  <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-700/50">
    <div>
      <h1 class="text-lg font-bold text-slate-100">{{title}}</h1>
      <div class="text-xs text-slate-500">{{timestamp_iso}}</div>
    </div>
    {{#has_category}}
    <span class="px-2 py-1 bg-slate-800 text-slate-300 text-xs rounded-md uppercase tracking-wider">{{category}}</span>
    {{/has_category}}
  </div>
  <div class="text-slate-300 leading-relaxed text-sm whitespace-pre-wrap">{{body}}</div>
</div>
